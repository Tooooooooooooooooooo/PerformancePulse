<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerformancePulse · 绩效图表</title>
  <script src="/api/app/chart-js"></script>
  <link id="dynamicFavicon" rel="icon" href="/favicon.ico">
  <script>
    // 初始化时从后端配置读取 favicon
    (function() {
      fetch('/api/performance/summary?_=' + Date.now())
        .then(r => r.json())
        .then(d => {
          const fav = ((d.config || {}).app || {}).favicon_url;
          const link = document.getElementById('dynamicFavicon');
          if (fav && link) link.href = fav;
        }).catch(() => {});
    })();
  </script>
  <style>
    :root{--bg:#0f0f13;--s1:#1a1a22;--s2:#22222e;--s3:#2a2a38;--bd:#2e2e3e;--ac:#c8a97e;--ac2:#7c6af5;--tx:#e8e6f0;--mu:#6b6880;--err:#e05c5c;--ok:#5cb85c;--warn:#f0a030}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx)}
    .wrap{max-width:1200px;margin:0 auto;padding:28px 20px 40px}
    .head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
    .title{font-size:22px;font-weight:600}
    .sub{font-size:12px;color:var(--mu)}
    .btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-family:inherit;transition:.2s;font-weight:500}
    .btn-p{background:var(--ac);color:#1a0f00}
    .btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
    .card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:14px}
    .ct{font-size:12px;font-weight:600;color:var(--ac);margin-bottom:12px}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
    .fg{display:flex;flex-direction:column;gap:4px}
    .fg label{font-size:11px;color:var(--mu)}
    .inp{padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:12px;outline:none}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
    .stat{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px}
    .sv{font-size:22px;font-weight:600;color:var(--ac)}
    .sl{font-size:11px;color:var(--mu);margin-top:4px}
    .charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .chart-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:14px}
    .chart-title{font-size:12px;color:var(--ac);margin-bottom:8px}
    .chart-wrap{width:100%;height:200px;max-height:200px;display:block}
    table{width:100%;border-collapse:collapse}
    th{padding:8px 10px;text-align:left;font-size:10px;color:var(--mu);letter-spacing:.07em;text-transform:uppercase;background:var(--s2);border-bottom:1px solid var(--bd)}
    td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--bd)}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;background:rgba(124,106,245,.15);color:var(--ac2)}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .muted{color:var(--mu);font-size:12px}
    .stat{transition:border-color .18s,background .18s}
    .stat-active{border-color:var(--ac) !important;background:rgba(200,169,126,.1) !important;box-shadow:0 0 0 1px var(--ac)}
    .stat-active .sv{color:var(--ac)}
    .scroll-hidden{overflow:auto;scrollbar-width:none;-ms-overflow-style:none}
    .scroll-hidden::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
  <div class="wrap" id="mainWrap">
    <div class="head">
      <div>
        <div class="title" id="pageTitle">PerformancePulse 绩效图表</div>
        <div class="sub" id="pageSubtitle">按人员/时间维度分析</div>
      </div>
      <div class="row-actions">
        <div id="themeSwitcher" style="display:flex;gap:5px;align-items:center"></div>
        <button class="btn btn-s" onclick="location.href='/admin'">管理后台</button>
        <button class="btn btn-p" onclick="exportPerf()">导出 Excel</button>
      </div>
    </div>

    <div class="card">
      <div class="ct">🔍 筛选条件</div>
      <div class="filters">
        <div class="fg">
          <label>人员</label>
          <select id="fPerson" class="inp"></select>
        </div>
        <div class="fg">
          <label>开始日期</label>
          <input id="fFrom" type="date" class="inp">
        </div>
        <div class="fg">
          <label>结束日期</label>
          <input id="fTo" type="date" class="inp">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-p" onclick="loadPerf()">应用筛选</button>
        <button class="btn btn-s" onclick="resetFilter()">重置</button>
        <span class="muted" id="filterHint"></span>
      </div>
    </div>

    <div class="stats" style="margin-bottom:14px" id="statsWrap">
      <!-- 由 renderStats() 动态填入，顺序由后台 stats_order 控制 -->
      <div class="stat" id="sAbsentWrap" style="display:none;grid-column:span 2;min-width:0">
        <div class="sl" style="margin-bottom:8px;font-size:11px;color:var(--mu)">员工未工作天数</div>
        <div id="sAbsentList" style="display:flex;flex-direction:column;gap:5px"></div>
      </div>
    </div>

    <div class="card" id="insightCard" style="margin-bottom:14px">
      <div class="ct">🧭 趋势解读</div>
      <div id="trendLine" style="font-size:11px;color:var(--mu);margin-bottom:10px"></div>
      <div style="font-size:11px;color:var(--mu);margin-bottom:8px">📊 对比视图：本月 vs 上月、今年 vs 去年同月</div>
      <div class="stats" id="compareStats" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px"></div>
    </div>

    <!-- KPI 总量趋势（独立模块） -->
    <div class="card" id="kpiTrendCard" style="display:none">
      <div class="ct">📈 KPI 总量趋势</div>
      <div id="overallKpiTagsWrap" style="display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:12px"></div>
      <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:3;min-width:240px">
          <canvas class="chart-wrap" id="overallKpiChart" style="height:220px;max-height:220px"></canvas>
        </div>
        <div style="flex:1;min-width:160px;max-width:220px" id="overallKpiPieWrap">
          <div style="font-size:11px;color:var(--mu);margin-bottom:6px;text-align:center">KPI 占比</div>
          <canvas id="overallKpiPieChart" style="width:100%;height:220px;max-height:220px;display:block"></canvas>
        </div>
      </div>
    </div>

    <div class="card" id="customFilterCard" style="display:none">
      <div class="ct">📌 自定义筛选项 KPI 总览</div>
      <div id="customFilterStats" class="stats"></div>
      <div class="charts" style="margin-top:14px">
        <div class="chart-card">
          <div class="chart-title" id="customSeriesTitle">原始数量趋势</div>
          <canvas class="chart-wrap" id="customFilterChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title" id="customClientRawTitle">甲方占比（原始）</div>
          <canvas class="chart-wrap" id="customClientChart"></canvas>
        </div>
      </div>
      <div class="charts" style="margin-top:14px">
        <div class="chart-card">
          <div class="chart-title" id="customSeriesKpiTitle">KPI 值趋势</div>
          <canvas class="chart-wrap" id="customFilterKpiChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title" id="customClientKpiTitle">甲方占比（KPI）</div>
          <canvas class="chart-wrap" id="customClientKpiChart"></canvas>
        </div>
      </div>
    </div>

    <!-- 甲方 KPI 走势 -->
    <div class="card" id="clientKpiCard" style="display:none;margin-top:14px">
      <div class="ct">🏢 甲方 KPI 走势</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:12px" id="clientTagsWrap"></div>
      <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:2;min-width:260px">
          <canvas class="chart-wrap" id="clientKpiChart" style="height:240px;max-height:240px"></canvas>
        </div>
        <div style="flex:1;min-width:200px;max-width:280px">
          <div style="font-size:11px;color:var(--mu);margin-bottom:6px;text-align:center">KPI 占比</div>
          <canvas id="clientKpiPieChart" style="width:100%;height:240px;max-height:240px;display:block"></canvas>
        </div>
      </div>
    </div>

    <!-- 人员 KPI 对比（独立模块，顺序由后台控制） -->
    <div class="card" id="personCompareCard" style="display:none">
      <div class="ct">👤 人员 KPI 对比</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
        <span style="font-size:11px;color:var(--mu)">点击人名加入 / 移除对比</span>
        <button class="btn btn-s" onclick="clearPersonCompare()" style="font-size:11px;padding:3px 9px">清空对比</button>
      </div>
      <div id="personTagsWrap" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px"></div>
      <div id="personCompareChartWrap" style="display:none">
        <canvas id="personCompareChart" style="width:100%;height:240px;max-height:240px;display:block"></canvas>
      </div>
      <div id="personCompareEmpty" style="font-size:12px;color:var(--mu);padding:8px 0">从上方点击人名开始对比</div>
    </div>

    <!-- 月度/人员任务量/人员KPI占比图表 -->
    <div class="charts" id="dailyChartsBlock" style="margin-bottom:14px">
      <div class="chart-card">
        <div class="chart-title" id="ctMonthChart">月度任务量</div>
        <canvas class="chart-wrap" id="chartMonth"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title" id="ctPersonChart">人员任务量</div>
        <canvas class="chart-wrap" id="chartPerson"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title" id="ctPersonKpiPieChart">人员KPI占比</div>
        <canvas class="chart-wrap" id="chartPersonKpiPie"></canvas>
      </div>
    </div>

    <!-- 明细表 -->
    <div class="card" id="detailTableBlock" style="margin-top:14px">
      <div class="ct">📋 明细表</div>
      <div class="scroll-hidden" style="max-height:360px">
        <table>
          <thead>
            <tr>
              <th>日期</th><th>人员</th><th>甲方</th><th>任务描述</th><th>数量</th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 模块顺序容器（JS动态排列后插入此处） -->
    <div id="moduleContainer"></div>

    <!-- 底部版权信息（与其他模块同宽，在 mainWrap 内） -->
    <footer id="pageFooter" style="display:none;margin-top:28px;padding-top:16px;border-top:1px solid var(--bd)">
      <div id="pageFooterInner" style="display:flex;flex-wrap:wrap;gap:6px 18px;align-items:center;justify-content:center;font-size:11px;color:var(--mu);line-height:2"></div>
    </footer>
  </div>

  <!-- 下钻抽屉 -->
  <div id="drillOverlay" onclick="closeDrill()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;backdrop-filter:blur(2px)"></div>
  <div id="drillDrawer" style="position:fixed;bottom:0;left:0;right:0;max-height:72vh;background:var(--s1);border-top:2px solid var(--ac);border-radius:16px 16px 0 0;z-index:901;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);visibility:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--bd);flex-shrink:0">
      <div>
        <div id="drillTitle" style="font-size:15px;font-weight:700;color:var(--tx)"></div>
        <div id="drillSub" style="font-size:11px;color:var(--mu);margin-top:3px"></div>
      </div>
      <button onclick="closeDrill()" style="background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:4px 10px;line-height:1;border-radius:6px">×</button>
    </div>
    <div style="overflow-y:auto;flex:1;padding-bottom:20px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="position:sticky;top:0;background:var(--s1);z-index:1">
            <th style="padding:8px 14px;text-align:left;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap">日期</th>
            <th style="padding:8px 14px;text-align:left;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap">人员</th>
            <th style="padding:8px 14px;text-align:left;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap">甲方</th>
            <th style="padding:8px 14px;text-align:left;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd)">任务</th>
            <th style="padding:8px 14px;text-align:right;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap">数量</th>
          </tr>
        </thead>
        <tbody id="drillBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ── 配色方案 ─────────────────────────────────────────────
    const THEMES = [
      { key:'dark',    label:'暗金',   vars:{bg:'#0f0f13',s1:'#1a1a22',s2:'#22222e',s3:'#2a2a38',bd:'#2e2e3e',ac:'#c8a97e',ac2:'#7c6af5',tx:'#e8e6f0',mu:'#6b6880'} },
      { key:'navy',    label:'深海蓝', vars:{bg:'#0a0f1e',s1:'#111827',s2:'#1e2a3a',s3:'#263347',bd:'#2d3f55',ac:'#60a5fa',ac2:'#a78bfa',tx:'#e2e8f0',mu:'#64748b'} },
      { key:'forest',  label:'深林绿', vars:{bg:'#0a130d',s1:'#111c14',s2:'#1a2b1d',s3:'#223826',bd:'#2d4a32',ac:'#4ade80',ac2:'#34d399',tx:'#e2ede4',mu:'#5a7a5e'} },
      { key:'rose',    label:'玫瑰红', vars:{bg:'#130a0f',s1:'#1f1118',s2:'#2d1a22',s3:'#3a2230',bd:'#4f2d3e',ac:'#fb7185',ac2:'#f472b6',tx:'#fce7f3',mu:'#9d6b7e'} },
      { key:'light',   label:'明亮',   vars:{bg:'#f4f4f8',s1:'#ffffff',s2:'#f0f0f5',s3:'#e8e8ef',bd:'#d8d8e4',ac:'#7c5cbf',ac2:'#4f8ef5',tx:'#1a1a2e',mu:'#7070a0'} },
    ];

    const THEME_STORAGE_KEY = 'pp_theme';
    const THEME_MANUAL_KEY  = 'pp_theme_manual';  // 用户是否主动切换过
    let _currentTheme = 'dark';

    function applyTheme(key) {
      const t = THEMES.find(t => t.key === key) || THEMES[0];
      _currentTheme = t.key;
      const root = document.documentElement;
      Object.entries(t.vars).forEach(([k, v]) => root.style.setProperty('--' + k, v));
      renderThemeSwitcher();
    }

    // 用户主动点击切换：记住选择 + 打上手动标记
    function switchTheme(key) {
      applyTheme(key);
      try {
        localStorage.setItem(THEME_STORAGE_KEY, key);
        localStorage.setItem(THEME_MANUAL_KEY, '1');
      } catch(e) {}
    }

    function renderThemeSwitcher() {
      const wrap = document.getElementById('themeSwitcher');
      if (!wrap) return;
      wrap.innerHTML = THEMES.map(t => {
        const isActive = _currentTheme === t.key;
        return `<div title="${t.label}" onclick="switchTheme('${t.key}')"
          style="cursor:pointer;width:18px;height:18px;border-radius:50%;
            background:${t.vars.ac};flex-shrink:0;
            box-shadow:${isActive ? '0 0 0 2px #fff, 0 0 0 4px ' + t.vars.ac : 'none'};
            transition:box-shadow .15s"></div>`;
      }).join('');
    }

    function initTheme(defaultTheme) {
      // 只有用户曾主动切换过，才沿用 localStorage 的值；否则以后台配置为准
      let key = defaultTheme || 'dark';
      try {
        const manual = localStorage.getItem(THEME_MANUAL_KEY);
        const saved  = localStorage.getItem(THEME_STORAGE_KEY);
        if (manual && saved) key = saved;
      } catch(e) {}
      applyTheme(key);
    }

    // ── 小数位 ────────────────────────────────────────────────
    let _decimalPlaces = 0;

    function fmtVal(v) {
      const n = Number(v) || 0;
      if (_decimalPlaces === 0) return Math.round(n).toLocaleString('zh-CN');
      return n.toFixed(_decimalPlaces).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    // ── 标题应用 ──────────────────────────────────────────────
    function applyTitles(titles) {
      if (!titles) return;
      const T = titles;
      const set = (id, v) => { const el = document.getElementById(id); if (el && v) el.textContent = v; };
      set('pageTitle',    T.page_title);
      set('pageSubtitle', T.page_subtitle);
      // 模块标题通过 ct class 元素设置
      const setct = (selector, v) => { const el = document.querySelector(selector); if (el && v) el.textContent = v; };
      setct('#kpiTrendCard .ct',       T.mod_kpi_trend     ? '📈 ' + T.mod_kpi_trend     : null);
      setct('#customFilterCard .ct',   T.mod_filter_stats  ? '📌 ' + T.mod_filter_stats  : null);
      set('customSeriesTitle',        T.mod_filter_raw         || null);
      set('customClientRawTitle',     T.mod_filter_client_raw  || null);
      set('customSeriesKpiTitle',     T.mod_filter_kpi         || null);
      set('customClientKpiTitle',     T.mod_filter_client_kpi  || null);
      setct('#personCompareCard .ct',  T.mod_person_compare? '👤 ' + T.mod_person_compare : null);
      setct('#detailTableBlock .ct',   T.mod_detail_table  ? '📋 ' + T.mod_detail_table  : null);
    }

    // ── 图表标题（从配置读取，渲染时使用） ───────────────────
    let _chartTitles = {};
    function ct(key, def) { return _chartTitles[key] || def; }

    let perfData = null;         // 人员+时间筛选
    let allPerfData = null;      // 无筛选（全量）
    let personFilterData = null; // 仅人员筛选（不含时间）→ 月度任务量
    let timeFilterData = null;   // 仅时间筛选（不含人员）→ 人员任务量/KPI占比
    let chartDay = null;
    let chartMonth = null;
    let chartTask = null;
    let chartPerson = null;
    let chartPersonKpiPie = null;
    let chartCustom = null;
    let chartCustomKpi = null;
    let chartCustomClient = null;
    let chartCustomClientKpi = null;
    let chartOverallKpi = null;
    let chartOverallKpiPie = null;
    let activeCustomFilter = '';
    let totalKpiLineVisible = false;
    let selectedPersons = [];
    let _statsOrder = ['total_kpi', 'task_progress', 'forecast', 'people', 'days', 'absent_days']; // 默认顺序
    let selectedClients = null;   // null = 全部，string = 单选甲方名
    let chartClientKpi = null;
    let chartClientKpiPie = null;       // 当前已选中的人员列表
    let chartPersonCompare = null;  // 人员对比图实例

    const valueLabelPlugin = {
      id: 'valueLabelPlugin',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        ctx.fillStyle = '#cfcbe0';
        ctx.font = '10px Noto Sans SC, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        chart.data.datasets.forEach((dataset, datasetIndex) => {
          const meta = chart.getDatasetMeta(datasetIndex);
          meta.data.forEach((element, index) => {
            const value = dataset.data[index];
            if (value === null || value === undefined) return;
            const pos = element.tooltipPosition();
            ctx.fillText(fmtVal(value), pos.x, pos.y - 4);
          });
        });
        ctx.restore();
      }
    };

    function setSelectOptions(select, list, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>` + list.map(v => `<option value="${v}">${v}</option>`).join('');
    }

    async function loadPerf() {
      const params = new URLSearchParams();
      const person = document.getElementById('fPerson').value;
      const from = document.getElementById('fFrom').value;
      const to = document.getElementById('fTo').value;
      if (person) params.append('person', person);
      if (from) params.append('from', from);
      if (to) params.append('to', to);
      // 时间戳防浏览器缓存
      const bust = Date.now();
      // 仅人员参数（月度任务量用）
      const personParams = new URLSearchParams();
      if (person) personParams.append('person', person);
      // 仅时间参数（人员任务量/KPI占比用）
      const timeParams = new URLSearchParams();
      if (from) timeParams.append('from', from);
      if (to)   timeParams.append('to', to);

      const [res, resAll, resPerson, resTime] = await Promise.all([
        fetch(`/api/performance/summary?${params.toString()}&_=${bust}`),
        fetch(`/api/performance/summary?_=${bust}`),
        fetch(`/api/performance/summary?${personParams.toString()}&_=${bust}`),
        fetch(`/api/performance/summary?${timeParams.toString()}&_=${bust}`)
      ]);
      perfData         = await res.json();
      allPerfData      = await resAll.json();
      personFilterData = await resPerson.json();
      timeFilterData   = await resTime.json();
      // 每次拉数据后同步最新配置（小数位、筛选项等后台改动立即生效）
      const appCfg = (allPerfData.config || {}).app || {};
      if (typeof appCfg.decimal_places !== 'undefined') {
        _decimalPlaces = typeof appCfg.decimal_places === 'number'
          ? appCfg.decimal_places
          : parseInt(appCfg.decimal_places || '0') || 0;
      }
      if (appCfg.stats_order && appCfg.stats_order.length) {
        _statsOrder = appCfg.stats_order;
      }
      if (appCfg.date_format) _dateFormat = appCfg.date_format;
      renderFooter(appCfg.footer_items || []);
      renderStats();
      renderCustomFilterStats();
      renderCharts();
      renderTable();
      renderHint();
      saveFilterState();
    }

    function renderFooter(items) {
      const wrap  = document.getElementById('pageFooter');
      const inner = document.getElementById('pageFooterInner');
      if (!wrap || !inner) return;
      const list = (items || []).filter(it => it && (it.text || '').trim());
      if (!list.length) { wrap.style.display = 'none'; return; }
      inner.innerHTML = list.map((it, i) => {
        const sep = i < list.length - 1
          ? `<span style="color:var(--bd);margin:0 2px">·</span>` : '';
        const txt = it.text.replace(/</g,'&lt;');
        const node = it.url
          ? `<a href="${it.url}" target="_blank" rel="noopener"
               style="color:var(--mu);text-decoration:none"
               onmouseover="this.style.color='var(--ac)'"
               onmouseout="this.style.color='var(--mu)'">${txt}</a>`
          : `<span>${txt}</span>`;
        return node + sep;
      }).join('');
      wrap.style.display = '';
    }

    function renderHint() {
      const hint = document.getElementById('filterHint');
      if (!perfData || !perfData.records) { hint.textContent = ''; return; }
      hint.textContent = `当前记录 ${perfData.records.length} 条`;
    }

    function isAdminHidden(id) {
      const el = document.getElementById(id);
      return el && el.dataset.adminHidden === '1';
    }

    function renderCustomFilterStats() {
      const card = document.getElementById('customFilterCard');
      const trendCard = document.getElementById('kpiTrendCard');
      const wrap = document.getElementById('customFilterStats');
      const list = perfData.filter_totals || [];
      const allRecords = (perfData || allPerfData).records || [];
      const hasRecords = allRecords.length > 0;

      // 自定义筛选项总览：仅有筛选项时显示；过滤掉无数据（kpi_value=0）的指标
      const visibleList = list.filter(item => (Number(item.kpi_value) || 0) > 0);
      if (visibleList.length && !isAdminHidden('customFilterCard')) {
        card.style.display = '';
        wrap.innerHTML = visibleList.map(item => `
          <div class="stat" data-filter="${item.name.replace(/"/g,'&quot;')}" style="cursor:pointer" onclick="selectCustomFilter('${item.name.replace(/'/g,"\\'")}')">
            <div class="sv">${item.quantity}${item.unit || ''}</div>
            <div class="sl">${item.name}${item.unit ? '（单位：'+item.unit+'）' : ''}</div>
            <div class="sl" style="margin-top:4px">KPI：${item.kpi_value}（系数 ${item.kpi_factor}）</div>
          </div>
        `).join('');
        // 如果之前恢复的activeCustomFilter不在当前可见筛选项里，重置为第一个
        if (!activeCustomFilter || !visibleList.find(f => f.name === activeCustomFilter)) {
          activeCustomFilter = visibleList[0].name;
        }
        highlightFilterStat(activeCustomFilter);
        totalKpiLineVisible = false;
        updateTotalKpiBtnState();
        // 用 requestAnimationFrame 延迟，确保浏览器完成 display:none→'' 的重绘后再初始化 Chart.js
        requestAnimationFrame(() => requestAnimationFrame(() => renderCustomFilterChart()));
      } else {
        card.style.display = 'none';
        activeCustomFilter = null;
      }

      // KPI总量趋势：有数据就显示，无筛选项时降级显示整体数量趋势
      if (hasRecords && !isAdminHidden('kpiTrendCard')) {
        trendCard.style.display = '';
        requestAnimationFrame(() => requestAnimationFrame(() => renderOverallKpiChart()));
      } else {
        trendCard.style.display = 'none';
      }

      // 甲方KPI走势
      renderClientKpiCard();

      // 人员对比：有数据就显示，完全独立
      const allPersons = [...new Set(allRecords.map(r => r.person))].sort();
      if (allPersons.length) {
        if (!isAdminHidden('personCompareCard')) document.getElementById('personCompareCard').style.display = '';
        selectedPersons = selectedPersons.filter(p => allPersons.includes(p));
        renderPersonTags();
        requestAnimationFrame(() => requestAnimationFrame(() => renderPersonCompareChart()));
      } else {
        document.getElementById('personCompareCard').style.display = 'none';
      }
    }

    // ── KPI 总量趋势：单选按钮 ──────────────────────────────
    let _overallKpiSelected = null; // null = 全部；'__total__' = KPI合计；string = 单选项名
    const _KPI_TOTAL_KEY = '__total__';

    function renderOverallKpiChart() {
      const list      = perfData.filter_totals || [];
      const seriesMap = perfData.filter_series || {};
      const ctx       = document.getElementById('overallKpiChart');
      const tagsWrap  = document.getElementById('overallKpiTagsWrap');
      const pieWrap   = document.getElementById('overallKpiPieWrap');
      if (!ctx) return;

      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];

      let labels = [];
      let dates  = [];
      let allDatasets = [];
      let hasPie = false; // only show pie when filter items exist

      const visibleList = list.filter(f => (Number(f.kpi_value) || 0) > 0);
      if (visibleList.length) {
        hasPie = true;
        const dateSet = new Set();
        visibleList.forEach(f => { (seriesMap[f.name]?.kpi || []).forEach(p => dateSet.add(p.date)); });
        dates  = Array.from(dateSet).sort();
        labels = visibleList.map(f => f.name);
        allDatasets = visibleList.map((f, i) => {
          const kpiMap = {};
          (seriesMap[f.name]?.kpi || []).forEach(p => { kpiMap[p.date] = p.value; });
          return {
            label: f.name,
            data: dates.map(dt => kpiMap[dt] ?? 0),
            borderColor: palette[i % palette.length],
            backgroundColor: palette[i % palette.length] + '33',
            borderWidth: 2, pointRadius: dates.length > 60 ? 0 : 2,
            pointHoverRadius: 4, tension: 0.35, fill: false
          };
        });
      } else {
        const records = (allPerfData || perfData).records || [];
        const dateSet = new Set(records.map(r => r.date));
        dates  = Array.from(dateSet).sort();
        const persons = [...new Set(records.map(r => r.person))].sort();
        labels = persons;
        allDatasets = persons.map((p, i) => {
          const pm = {};
          records.filter(r => r.person === p).forEach(r => {
            pm[r.date] = (pm[r.date] || 0) + (Number(r.kpi_value) || 0);
          });
          return {
            label: p,
            data: dates.map(dt => pm[dt] ?? 0),
            borderColor: palette[i % palette.length],
            backgroundColor: palette[i % palette.length] + '33',
            borderWidth: 2, pointRadius: dates.length > 60 ? 0 : 2,
            pointHoverRadius: 4, tension: 0.35, fill: false
          };
        });
      }

      if (!dates.length) {
        chartOverallKpi && chartOverallKpi.destroy();
        chartOverallKpiPie && chartOverallKpiPie.destroy();
        if (tagsWrap) tagsWrap.innerHTML = '';
        if (pieWrap) pieWrap.style.display = 'none';
        return;
      }

      // ── KPI合计数据集（所有分项按日期叠加）────────────────────
      const totalData = dates.map((dt, di) =>
        allDatasets.reduce((s, ds) => s + (Number(ds.data[di]) || 0), 0)
      );
      const totalDataset = {
        label: 'KPI合计',
        data: totalData,
        borderColor: '#ffffff',
        backgroundColor: 'rgba(255,255,255,.08)',
        borderWidth: 2.5,
        borderDash: [5, 3],
        pointRadius: dates.length > 60 ? 0 : 3,
        pointHoverRadius: 5,
        tension: 0.35,
        fill: false
      };

      // 校正 selected
      const validKeys = [null, _KPI_TOTAL_KEY, ...labels];
      if (!validKeys.includes(_overallKpiSelected)) _overallKpiSelected = null;

      // ── 单选按钮组（全部 + KPI合计 + 各分项）─────────────────
      if (tagsWrap) {
        const makeBtn = (key, label, color, isSolid) => {
          const active = _overallKpiSelected === key;
          const safeName = key === null ? 'null' : `'${String(key).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}' `;
          const borderC  = active ? (color || 'var(--ac)') : 'var(--bd)';
          const bgC      = active ? (color ? color + '22' : 'rgba(200,169,126,.18)') : 'var(--s2)';
          const textC    = active ? (color || 'var(--ac)') : 'var(--mu)';
          const dot      = active ? '● ' : '';
          const extraStyle = isSolid ? '' : 'border-style:dashed;';
          return `<span onclick="selectOverallKpi(${safeName})" style="
            cursor:pointer;display:inline-flex;align-items:center;padding:4px 12px;
            border-radius:20px;font-size:12px;font-weight:500;user-select:none;transition:all .15s;
            border:1.5px solid ${borderC};${extraStyle}
            background:${bgC};color:${textC}">${dot}${label}</span>`;
        };

        tagsWrap.innerHTML =
          makeBtn(null, '全部', null, true) +
          makeBtn(_KPI_TOTAL_KEY, 'KPI合计', '#ffffff', false) +
          allDatasets.map((ds, i) => makeBtn(ds.label, ds.label, palette[i % palette.length], true)).join('');
      }

      // ── 决定折线图展示的数据集 ─────────────────────────────────
      let finalDatasets;
      if (_overallKpiSelected === null) {
        // 全部：各分项 + KPI合计虚线
        finalDatasets = [...allDatasets, totalDataset];
      } else if (_overallKpiSelected === _KPI_TOTAL_KEY) {
        // 仅KPI合计
        finalDatasets = [totalDataset];
      } else {
        // 单选某分项
        finalDatasets = allDatasets.filter(ds => ds.label === _overallKpiSelected);
      }

      // ── 折线图数据标签插件 ────────────────────────────────────
      const labelPlugin = {
        id: 'overallLabelPlugin',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;
          ctx.save();
          chart.data.datasets.forEach((dataset, di) => {
            const meta = chart.getDatasetMeta(di);
            if (meta.hidden) return;
            const isTotal = dataset.label === 'KPI合计';
            ctx.font = isTotal ? 'bold 9px Noto Sans SC,sans-serif' : '9px Noto Sans SC,sans-serif';
            ctx.fillStyle = dataset.borderColor || '#cfcbe0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            meta.data.forEach((el, idx) => {
              const v = dataset.data[idx];
              if (!v) return;
              ctx.fillText(fmtVal(v), el.tooltipPosition().x, el.tooltipPosition().y - 5);
            });
          });
          ctx.restore();
        }
      };

      chartOverallKpi && chartOverallKpi.destroy();
      chartOverallKpi = new Chart(ctx, {
        type: 'line',
        data: { labels: dates.map(fmtDateLabel), datasets: finalDatasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#cfcbe0', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.05)' } },
            y: { ticks: { color: '#cfcbe0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true, grace: '8%' }
          },
          layout: { padding: { top: 18 } }
        },
        plugins: [labelPlugin]
      });

      // ── 饼图（仅有筛选项时显示）──────────────────────────────
      if (pieWrap) pieWrap.style.display = hasPie ? '' : 'none';
      if (hasPie) _renderOverallKpiPie(allDatasets, palette);
    }

    function _renderOverallKpiPie(allDatasets, palette) {
      const pieCtx = document.getElementById('overallKpiPieChart');
      if (!pieCtx) return;

      // 当单选某分项时，饼图也只高亮该项（其余变暗），全选/KPI合计时正常显示所有
      const labels = [], data = [], colors = [], borderColors = [];
      allDatasets.forEach((ds, i) => {
        const total = ds.data.reduce((s, v) => s + (Number(v) || 0), 0);
        if (!total) return;
        labels.push(ds.label);
        data.push(total);
        const base = palette[i % palette.length];
        const isDimmed = _overallKpiSelected !== null &&
                         _overallKpiSelected !== _KPI_TOTAL_KEY &&
                         _overallKpiSelected !== ds.label;
        colors.push(isDimmed ? base + '33' : base + 'cc');
        borderColors.push(isDimmed ? base + '55' : base);
      });

      chartOverallKpiPie && chartOverallKpiPie.destroy();
      if (!labels.length) return;

      const totalKpi = data.reduce((s, v) => s + v, 0);

      chartOverallKpiPie = new Chart(pieCtx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{ data, backgroundColor: colors, borderColor: borderColors, borderWidth: 1.5, hoverOffset: 8 }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: { color: '#cfcbe0', font: { size: 10 }, boxWidth: 10, padding: 8 }
            },
            tooltip: {
              callbacks: {
                label(ctx) {
                  const pct = totalKpi > 0 ? (ctx.parsed / totalKpi * 100).toFixed(1) : 0;
                  return ` ${ctx.label}: ${fmtVal(ctx.parsed)} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }

    function selectOverallKpi(name) {
      _overallKpiSelected = name;
      renderOverallKpiChart();
    }

    function toggleTotalKpiLine() {}
    function updateTotalKpiBtnState() {}




    // ── 人员 KPI 对比 ──────────────────────────────────────────
    // ── 甲方 KPI 走势 ────────────────────────────────────────
    function renderClientKpiCard() {
      const card   = document.getElementById('clientKpiCard');
      const series = (allPerfData || perfData).client_kpi_series || {};
      const clients = Object.keys(series).sort();
      if (!clients.length || isAdminHidden('clientKpiCard')) { card.style.display = 'none'; return; }

      card.style.display = '';

      // 初始化：全部（null），若已选中但甲方消失则重置
      if (selectedClients !== null && !clients.includes(selectedClients)) selectedClients = null;

      renderClientTags(clients);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        renderClientKpiChart(series, clients);
        renderClientKpiPie(series, clients);
      }));
    }

    function renderClientTags(clients) {
      const wrap = document.getElementById('clientTagsWrap');
      if (!wrap) return;
      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];

      wrap.innerHTML =
        `<span onclick="selectClient(null)" style="
          cursor:pointer;display:inline-flex;align-items:center;padding:4px 11px;
          border-radius:20px;font-size:12px;font-weight:500;user-select:none;transition:all .15s;
          border:1.5px solid ${selectedClients===null?'var(--ac)':'var(--bd)'};
          background:${selectedClients===null?'rgba(200,169,126,.18)':'var(--s2)'};
          color:${selectedClients===null?'var(--ac)':'var(--mu)'}">
          ${selectedClients===null?'● ':''}全部
        </span>` +
        clients.map((cl, i) => {
          const active = selectedClients === cl;
          const color  = palette[i % palette.length];
          const safe   = cl.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<span onclick="selectClient('${safe}')" style="
            cursor:pointer;display:inline-flex;align-items:center;padding:4px 11px;
            border-radius:20px;font-size:12px;font-weight:500;user-select:none;transition:all .15s;
            border:1.5px solid ${active?color:'var(--bd)'};
            background:${active?color+'22':'var(--s2)'};
            color:${active?color:'var(--mu)'}">
            ${active?'● ':''}${cl}
          </span>`;
        }).join('');
    }

    function selectClient(name) {
      const series  = (allPerfData || perfData).client_kpi_series || {};
      const clients = Object.keys(series).sort();
      selectedClients = name;   // null = 全部；string = 单选
      renderClientTags(clients);
      renderClientKpiChart(series, clients);
      renderClientKpiPie(series, clients);
    }

    function toggleClient(name) { selectClient(name === selectedClients ? null : name); }
    function toggleAllClients()  { selectClient(null); }

    function renderClientKpiChart(series, allClients) {
      const ctx = document.getElementById('clientKpiChart');
      if (!ctx) return;
      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];

      // 汇总所有已选甲方的日期
      const dateSet = new Set();
      allClients.forEach(cl => {
        if (selectedClients === null || selectedClients === cl) {
          (series[cl] || []).forEach(p => dateSet.add(p.date));
        }
      });
      const dates = Array.from(dateSet).sort();

      const datasets = allClients
        .map((cl, i) => ({ cl, i }))
        .filter(({ cl }) => selectedClients === null || selectedClients === cl)
        .map(({ cl, i }) => {
          const m = {};
          (series[cl] || []).forEach(p => { m[p.date] = p.value; });
          const color = palette[i % palette.length];
          return {
            label: cl,
            data: dates.map(dt => m[dt] ?? 0),
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            pointRadius: dates.length > 60 ? 0 : 3,
            pointHoverRadius: 5,
            tension: 0.35,
            fill: false
          };
        });

      chartClientKpi && chartClientKpi.destroy();
      if (!dates.length) return;

      const labelPlugin = {
        id: 'clientLabelPlugin',
        afterDatasetsDraw(chart) {
          const { ctx } = chart;
          ctx.save();
          chart.data.datasets.forEach((ds, di) => {
            const meta = chart.getDatasetMeta(di);
            if (meta.hidden) return;
            ctx.font = '9px Noto Sans SC,sans-serif';
            ctx.fillStyle = ds.borderColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            meta.data.forEach((el, idx) => {
              const v = ds.data[idx];
              if (!v) return;
              ctx.fillText(fmtVal(v), el.tooltipPosition().x, el.tooltipPosition().y - 4);
            });
          });
          ctx.restore();
        }
      };

      chartClientKpi = new Chart(ctx, {
        type: 'line',
        data: { labels: dates.map(fmtDateLabel), datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#cfcbe0', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.05)' } },
            y: { ticks: { color: '#cfcbe0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true, grace: '8%' }
          },
          layout: { padding: { top: 28 } }
        },
        plugins: [labelPlugin]
      });
    }
    function renderClientKpiPie(series, allClients) {
      const ctx = document.getElementById('clientKpiPieChart');
      if (!ctx) return;
      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];

      // 只统计已选甲方的 KPI 总量
      const labels = [], data = [], colors = [];
      allClients.forEach((cl, i) => {
        if (selectedClients !== null && selectedClients !== cl) return;
        const total = (series[cl] || []).reduce((s, p) => s + (Number(p.value) || 0), 0);
        if (!total) return;
        labels.push(cl);
        data.push(total);
        colors.push(palette[i % palette.length]);
      });

      chartClientKpiPie && chartClientKpiPie.destroy();
      if (!labels.length) return;

      chartClientKpiPie = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors.map(c => c + 'cc'),
            borderColor: colors,
            borderWidth: 1.5,
            hoverOffset: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: { color: '#cfcbe0', font: { size: 10 }, boxWidth: 10, padding: 8 }
            },
            tooltip: {
              callbacks: {
                label(ctx) {
                  const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  const pct = total ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                  return ` ${ctx.label}: ${fmtVal(ctx.parsed)} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }
    // ─────────────────────────────────────────────────────────

    function renderPersonTags() {
      const wrap = document.getElementById('personTagsWrap');
      if (!wrap) return;
      const records = (perfData || allPerfData).records || [];
      const allPersons = [...new Set(records.map(r => r.person))].sort();
      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];

      // 计算每人 KPI 合计
      const kpiByPerson = {};
      records.forEach(r => {
        kpiByPerson[r.person] = (kpiByPerson[r.person] || 0) + (Number(r.kpi_value) || 0);
      });

      wrap.innerHTML = allPersons.map((p, i) => {
        const isActive = selectedPersons.includes(p);
        const color    = palette[i % palette.length];
        const kpiTotal = kpiByPerson[p] || 0;
        const kpiLabel = kpiTotal % 1 === 0 ? kpiTotal : kpiTotal.toFixed(1);
        return `<span
          onclick="togglePersonCompare('${p.replace(/'/g,"\\'")}')"
          style="
            cursor:pointer;display:inline-flex;align-items:center;gap:5px;
            padding:4px 11px;border-radius:20px;font-size:12px;font-weight:500;
            border:1.5px solid ${isActive ? color : 'var(--bd)'};
            background:${isActive ? color + '22' : 'var(--s2)'};
            color:${isActive ? color : 'var(--mu)'};
            transition:all .15s;user-select:none;
          ">
          ${isActive ? '✓ ' : ''}${p}<span style="opacity:.7;font-size:11px;font-weight:400">&nbsp;${kpiLabel}</span>
        </span>`;
      }).join('');
    }

    function togglePersonCompare(name) {
      const idx = selectedPersons.indexOf(name);
      if (idx === -1) selectedPersons.push(name);
      else selectedPersons.splice(idx, 1);
      renderPersonTags();
      renderPersonCompareChart();
    }

    function clearPersonCompare() {
      selectedPersons = [];
      renderPersonTags();
      renderPersonCompareChart();
    }

    function renderPersonCompareChart() {
      const chartWrap = document.getElementById('personCompareChartWrap');
      const emptyEl = document.getElementById('personCompareEmpty');
      const ctx = document.getElementById('personCompareChart');
      chartPersonCompare && chartPersonCompare.destroy();
      chartPersonCompare = null;

      if (!selectedPersons.length) {
        chartWrap.style.display = 'none';
        emptyEl.style.display = '';
        return;
      }
      chartWrap.style.display = '';
      emptyEl.style.display = 'none';

      const records = (perfData || allPerfData).records || [];

    function renderStats() {
      const t = perfData.totals || {};
      const filterKpiTotal = (perfData.filter_totals || []).reduce((s, f) => s + (Number(f.kpi_value) || 0), 0);
      const peopleCount = Number(t.total_people || 0);
      const targetInfo = (perfData.insights || {}).target || {};
      const targetValue = Number(targetInfo.value || 0);
      const progressValue = (targetValue > 0 && peopleCount > 0)
        ? (filterKpiTotal / (targetValue * peopleCount))
        : null;

      // 各指标的 HTML 生成器（按需构建，不含 absent）
      const STAT_BUILDERS = {
        total_kpi: () => `<div class="stat"><div class="sv" id="sTotalQty">${fmtNum(filterKpiTotal)}</div><div class="sl">任务总量（KPI）</div></div>`,
        task_progress: () => {
          const progressText = progressValue !== null ? `${(progressValue * 100).toFixed(1)}%` : '-';
          const targetText = targetValue > 0 ? fmtNum(targetValue) : '-';
          const sourceText = targetInfo.source ? `（来源：${targetInfo.source}）` : '';
          return `<div class="stat"><div class="sv">${progressText}</div><div class="sl">任务进度</div><div style="font-size:10px;color:var(--mu);margin-top:4px">目标值：${targetText}${sourceText}</div></div>`;
        },
        forecast:  () => {
          // 预测卡片占位，实际内容由 renderForecast 填充
          return `<div class="stat" id="sForecastWrap" style="display:none;border-color:rgba(200,169,126,.4);position:relative;overflow:hidden">
            <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,169,126,.08),transparent);pointer-events:none"></div>
            <div style="display:flex;align-items:baseline;gap:6px">
              <div class="sv" id="sForecast" style="color:var(--warn)">-</div>
              <div style="font-size:10px;color:var(--warn);opacity:.8">预测</div>
            </div>
            <div class="sl" id="sForecastLabel">当月预测 KPI</div>
            <div style="font-size:10px;color:var(--mu);margin-top:4px" id="sForecastMeta"></div>
          </div>`;
        },
        people: () => `<div class="stat"><div class="sv" id="sPeople">${t.total_people ?? 0}</div><div class="sl">涉及人员</div></div>`,
        days:   () => `<div class="stat"><div class="sv" id="sDays">${t.total_days ?? 0}</div><div class="sl">涉及天数</div></div>`,
      };

      const wrap = document.getElementById('statsWrap');
      const absentEl = document.getElementById('sAbsentWrap');
      const hiddenStats = new Set(((allPerfData?.config?.app || perfData?.config?.app || {}).hidden_stats) || []);

      if (hiddenStats.has('absent_days')) {
        absentEl.style.display = 'none';
      }

      // 按 _statsOrder 顺序插入到 absentWrap 之前
      const order = (_statsOrder || []).filter(k => STAT_BUILDERS[k]);
      // 补上未在 order 里的指标
      Object.keys(STAT_BUILDERS).forEach(k => { if (!order.includes(k)) order.push(k); });
      const visibleOrder = order.filter(k => !hiddenStats.has(k));

      // 先移除旧的动态卡片（保留 sAbsentWrap）
      Array.from(wrap.children).forEach(el => {
        if (el.id !== 'sAbsentWrap') el.remove();
      });

      // 按顺序插入到 absentWrap 前（只渲染可见指标）
      visibleOrder.forEach(key => {
        const html = STAT_BUILDERS[key]();
        const tmp = document.createElement('div');
        tmp.innerHTML = html.trim();
        wrap.insertBefore(tmp.firstElementChild, absentEl);
      });

      const showAbsent = !hiddenStats.has('absent_days');
      renderForecast(filterKpiTotal, visibleOrder.includes('forecast'));
      renderAbsent(showAbsent);
      renderInsights();

    function fmtPct(p) {
      if (p === null || p === undefined || Number.isNaN(Number(p))) return '-';
      const n = Number(p) * 100;
      const sign = n > 0 ? '+' : '';
      return `${sign}${n.toFixed(1)}%`;
    }

    function renderInsights() {
      const ins = perfData.insights || {};
      const wk  = ins.week_vs_last || {};
      const trend = ins.trend_text || '暂无趋势数据';

      // 计算本周日期范围：与后端逻辑一致，取数据最后一天往前7天
      const records = (perfData.records || []);
      const allDates = records.map(r => r.date).filter(Boolean).sort();
      let weekRangeText = '';
      if (allDates.length) {
        const endDate  = new Date(allDates[allDates.length - 1] + 'T00:00:00');
        const startDate = new Date(endDate);
        startDate.setDate(endDate.getDate() - 6);
        const fmt = d => d.toISOString().slice(0, 10);
        weekRangeText = `${fmt(startDate)} ~ ${fmt(endDate)}`;
      }

      const trendEl = document.getElementById('trendLine');
      trendEl.innerHTML = weekRangeText
        ? `📅 ${weekRangeText}&nbsp;&nbsp;&nbsp;${trend}`
        : trend;

      const mv = ins.month_vs_last || {};
      const yv = ins.yoy_month || {};
      const hasMonthCompare = (mv.current !== undefined || mv.previous !== undefined || mv.change_pct !== undefined);
      const hasYoyCompare = (yv.current !== undefined || yv.previous !== undefined || yv.change_pct !== undefined);

      const wrap = document.getElementById('compareStats');
      if (!hasMonthCompare && !hasYoyCompare) {
        wrap.innerHTML = `<div class="stat" style="grid-column:1/-1"><div class="sl">暂无可展示的对比数据</div></div>`;
        return;
      }

      wrap.innerHTML = `
        <div class="stat"><div class="sv">${fmtNum(mv.current ?? 0)}</div><div class="sl">本月 KPI</div><div class="sl">较上月 ${fmtPct(mv.change_pct)}</div></div>
        <div class="stat"><div class="sv">${fmtNum(mv.previous ?? 0)}</div><div class="sl">上月 KPI</div><div class="sl">环比基数</div></div>
        <div class="stat"><div class="sv">${fmtNum(yv.current ?? 0)}</div><div class="sl">本月 KPI（同比）</div><div class="sl">较去年同月 ${fmtPct(yv.change_pct)}</div></div>
        <div class="stat"><div class="sv">${fmtNum(yv.previous ?? 0)}</div><div class="sl">去年同月 KPI</div><div class="sl">同比基数</div></div>
      `;
    }

    function renderAbsent(visible = true) {
      const wrap = document.getElementById('sAbsentWrap');
      const list = document.getElementById('sAbsentList');
      if (!visible) { wrap.style.display = 'none'; return; }
      const records = perfData.records || [];
      if (!records.length) { wrap.style.display = 'none'; return; }

      // 数据中最早和最晚日期
      const allRecordDates = [...new Set(records.map(r => r.date))].sort();
      if (!allRecordDates.length) { wrap.style.display = 'none'; return; }

      // 生成从 minDate 到 maxDate 的所有日历天（含周六日）
      const minDate = allRecordDates[0];
      const maxDate = allRecordDates[allRecordDates.length - 1];
      const calendarDays = [];
      const cur = new Date(minDate + 'T00:00:00');
      const end = new Date(maxDate + 'T00:00:00');
      while (cur <= end) {
        calendarDays.push(cur.toISOString().slice(0, 10));
        cur.setDate(cur.getDate() + 1);
      }
      const totalCalendarDays = calendarDays.length;

      // 每个人实际工作的日期集合
      const personDays = {};
      records.forEach(r => {
        if (!personDays[r.person]) personDays[r.person] = new Set();
        personDays[r.person].add(r.date);
      });

      const people = Object.keys(personDays).sort();
      // 未工作天数 = 日历总天数 - 该人有工作记录的天数
      const absentData = people.map(p => ({
        name: p,
        absent: totalCalendarDays - personDays[p].size,
        worked: personDays[p].size
      })).filter(d => d.absent > 0).sort((a, b) => b.absent - a.absent);

      if (!absentData.length) { wrap.style.display = 'none'; return; }

      wrap.style.display = '';
      const palette = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];
      const allPeople = people;

      list.innerHTML = absentData.map(d => {
        const pct = Math.round((d.absent / totalCalendarDays) * 100);
        const colorIdx = allPeople.indexOf(d.name);
        const color = palette[colorIdx % palette.length];
        return `
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--tx);min-width:72px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${d.name}">${d.name}</span>
            <div style="flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;opacity:.75"></div>
            </div>
            <span style="font-size:12px;font-weight:600;color:${color};min-width:28px;text-align:right">${d.absent}</span>
            <span style="font-size:10px;color:var(--mu);min-width:28px">/ ${totalCalendarDays} 天</span>
          </div>`;
      }).join('');
    }

    function fmtNum(v) { return fmtVal(v); }

    // 图表 x 轴日期格式化：去掉年份，只显示月/日
    function fmtDateLabel(raw) {
      if (!raw) return raw;
      const s = String(raw);
      if (_dateFormat === 'ymd') {
        // 年-月-日：原样返回
        return s;
      }
      // 默认 md：只显示月/日
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s.slice(5).replace('-', '/');
      if (/^\d{4}-\d{2}$/.test(s)) return s.slice(5) + '月';
      return s;
    }

    function renderForecast(currentKpi, forecastVisible = true) {
      const wrap = document.getElementById('sForecastWrap');
      const valEl = document.getElementById('sForecast');
      const labelEl = document.getElementById('sForecastLabel');
      const metaEl = document.getElementById('sForecastMeta');
      if (!forecastVisible || !wrap || !valEl || !labelEl || !metaEl) {
        if (wrap) wrap.style.display = 'none';
        return;
      }

      // 判断是否存在日期筛选，若有则不预测
      const fromVal = document.getElementById('fFrom').value;
      const toVal = document.getElementById('fTo').value;

      // 取数据中出现的日期，判断是否属于同一个月
      const records = perfData.records || [];
      if (!records.length || !currentKpi) { wrap.style.display = 'none'; return; }

      // 获取数据日期范围
      const dates = records.map(r => r.date).sort();
      const firstDate = dates[0];
      const lastDate = dates[dates.length - 1];
      const firstMonth = firstDate.slice(0, 7);
      const lastMonth = lastDate.slice(0, 7);

      // 只在数据属于同一个自然月（或未指定筛选）时显示预测
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);
      const currentMonthStr = todayStr.slice(0, 7);

      // 确定预测所基于的月份：优先用数据的最新月
      const targetMonth = lastMonth;
      const [tYear, tMon] = targetMonth.split('-').map(Number);
      const daysInMonth = new Date(tYear, tMon, 0).getDate();

      // 今天在该月中的进度
      let daysPassed;
      if (targetMonth === currentMonthStr) {
        daysPassed = today.getDate();
      } else {
        // 历史月份，数据已完整，直接用月末
        daysPassed = daysInMonth;
      }

      if (daysPassed <= 0) { wrap.style.display = 'none'; return; }

      // 当月已有KPI：仅统计 targetMonth 的记录
      const monthRecords = records.filter(r => r.date && r.date.startsWith(targetMonth));
      const customFilters = (perfData.config?.custom_filters || []).filter(f => f.enabled);
      let monthKpi = 0;
      monthRecords.forEach(r => {
        const flt = customFilters.find(f => f.keyword && (r.task_desc || '').includes(f.keyword));
        if (flt) monthKpi += (Number(r.quantity) || 0) * (Number(flt.kpi) || 1);
      });

      if (!monthKpi) { wrap.style.display = 'none'; return; }

      const progress = daysPassed / daysInMonth;
      const predicted = monthKpi / progress;
      const progressPct = Math.round(progress * 100);

      wrap.style.display = '';
      valEl.textContent = fmtNum(Math.round(predicted));
      labelEl.textContent = `${targetMonth} 预测 KPI`;
      metaEl.textContent = `已过 ${daysPassed}/${daysInMonth} 天（${progressPct}%）· 已完成 ${fmtNum(monthKpi)}`;
    }

        `<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--mu)">暂无明细数据</td></tr>`;

      overlay.style.display = 'block';
      drawer.style.visibility = 'visible';
      requestAnimationFrame(() => { drawer.style.transform = 'translateY(0)'; });
      _drillOpen = true;
    }

    function closeDrill() {
      const drawer  = document.getElementById('drillDrawer');
      const overlay = document.getElementById('drillOverlay');
      drawer.style.transform = 'translateY(100%)';
      setTimeout(() => {
        overlay.style.display = 'none';
        drawer.style.visibility = 'hidden';
      }, 320);
      _drillOpen = false;
    }

    // ESC 关闭
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && _drillOpen) closeDrill(); });

    function drillByDate(dateLabel) {
      // dateLabel 是格式化后的（03/12 或 2026-03-12），需匹配原始 date 字段
      const recs = (perfData.records || []).filter(r => {
        const fmt = fmtDateLabel(r.date);
        return fmt === dateLabel || r.date === dateLabel;
      });
      const total = recs.reduce((s, r) => s + (r.kpi_value ?? 0), 0);
      openDrill(`📅 ${dateLabel} 明细`, `共 ${recs.length} 条记录，KPI 合计 ${fmtVal(total)}`, recs);
    }

    function drillByMonth(monthLabel) {
      const recs = (perfData.records || []).filter(r => {
        const fmt = fmtDateLabel(r.month);
        return fmt === monthLabel || r.month === monthLabel;
      });
      const total = recs.reduce((s, r) => s + (r.kpi_value ?? 0), 0);
      openDrill(`📆 ${monthLabel} 明细`, `共 ${recs.length} 条记录，KPI 合计 ${fmtVal(total)}`, recs);
    }

    function drillByPerson(person) {
      const recs = (perfData.records || []).filter(r => r.person === person);
      const total = recs.reduce((s, r) => s + (r.kpi_value ?? 0), 0);
      openDrill(`👤 ${person} 明细`, `共 ${recs.length} 条记录，KPI 合计 ${fmtVal(total)}`, recs);
    }
    function splitKeywords(text) {
      return String(text || '').split(/[，,；;]+/).map(s => s.trim().toLowerCase()).filter(Boolean);
    }

    function isRecordMatchedByActiveFilter(r) {
      if (!activeCustomFilter) return true;
      const cfs = (perfData?.config?.custom_filters || []).filter(f => f && f.enabled);
      const item = cfs.find(f => f.name === activeCustomFilter);
      if (!item) return true;
      const kws = splitKeywords(item.keyword || '');
      if (!kws.length) return true;
      const text = `${r.task_desc || ''} ${r.client || ''}`.toLowerCase();
      return kws.some(kw => text.includes(kw));
    }

    function drillByFilterDate(dateLabel) {
      const filterName = activeCustomFilter || '筛选项';
      const recs = (perfData.records || []).filter(r => {
        if (!isRecordMatchedByActiveFilter(r)) return false;
        return fmtDateLabel(r.date) === dateLabel || r.date === dateLabel;
      });
      const total = recs.reduce((s, r) => s + (r.kpi_value ?? 0), 0);
      openDrill(`📅 ${filterName} · ${dateLabel} 明细`, `共 ${recs.length} 条记录，KPI 合计 ${fmtVal(total)}`, recs);
    }

    function drillByFilterClient(client) {
      const filterName = activeCustomFilter || '筛选项';
      const recs = (perfData.records || []).filter(r => {
        if (!isRecordMatchedByActiveFilter(r)) return false;
        return (r.client || '') === client;
      });
      const total = recs.reduce((s, r) => s + (r.kpi_value ?? 0), 0);
      openDrill(`🏢 ${filterName} · ${client} 明细`, `共 ${recs.length} 条记录，KPI 合计 ${fmtVal(total)}`, recs);
    }
    // ─────────────────────────────────────────────────────────

    function chartConfig(labels, values, label, color, onClickFn) {
      return {
        type: 'bar',
        data: { labels, datasets: [{ label, data: values, backgroundColor: color, hoverBackgroundColor: color.replace(/[\d.]+\)$/, '1)') }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          layout: { padding: { top: 28 } },
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#cfcbe0', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.05)' } },
            y: { ticks: { color: '#cfcbe0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.05)' }, beginAtZero: true, grace: '8%' }
          },
          onClick: onClickFn ? (evt, els, chart) => {
            if (!els.length) return;
            onClickFn(chart.data.labels[els[0].index]);
          } : undefined,
          onHover: onClickFn ? (evt, els) => {
            evt.native.target.style.cursor = els.length ? 'pointer' : 'default';
          } : undefined,
        },
        plugins: [valueLabelPlugin]
      };
    }

    function renderCharts() {
      if (isAdminHidden('dailyChartsBlock')) return;
      // 月度任务量：受人员筛选、不受时间筛选
      const byMonth  = (personFilterData || allPerfData || perfData).by_month || [];
      // 人员任务量：受时间筛选、不受人员筛选
      const byPerson = (timeFilterData || perfData).by_person || [];

      chartMonth && chartMonth.destroy();
      chartPerson && chartPerson.destroy();
      chartPersonKpiPie && chartPersonKpiPie.destroy();

      chartMonth = new Chart(document.getElementById('chartMonth'), chartConfig(byMonth.map(i=>fmtDateLabel(i.label)), byMonth.map(i=>i.value), '数量', 'rgba(124,106,245,.55)', drillByMonth));
      chartPerson = new Chart(document.getElementById('chartPerson'), chartConfig(byPerson.map(i=>i.label), byPerson.map(i=>i.value), '数量', 'rgba(92,184,92,.55)', drillByPerson));

      // 人员KPI占比饼图：受时间筛选、不受人员筛选
      const byPersonKpi = (timeFilterData || perfData).by_person || [];
      const pieLabels = byPersonKpi.map(i => i.label);
      const pieData   = byPersonKpi.map(i => i.value);
      const palette   = ['#c8a97e','#7c6af5','#5cb85c','#e05c5c','#f0a030','#06b6d4','#ec4899','#14b8a6','#a78bfa','#34d399'];
      const pieCtx    = document.getElementById('chartPersonKpiPie');
      if (pieCtx && pieLabels.length) {
        const totalKpi = pieData.reduce((s, v) => s + v, 0);
        chartPersonKpiPie = new Chart(pieCtx, {
          type: 'doughnut',
          data: {
            labels: pieLabels,
            datasets: [{
              data: pieData,
              backgroundColor: pieLabels.map((_, i) => palette[i % palette.length] + 'cc'),
              borderColor:     pieLabels.map((_, i) => palette[i % palette.length]),
              borderWidth: 1.5,
              hoverOffset: 8
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: true, position: 'bottom', labels: { color: '#cfcbe0', font: { size: 10 }, boxWidth: 10, padding: 8 } },
              tooltip: {
                callbacks: {
                  label(ctx) {
                    const pct = totalKpi > 0 ? (ctx.parsed / totalKpi * 100).toFixed(1) : 0;
                    return ` ${ctx.label}: ${fmtVal(ctx.parsed)} (${pct}%)`;
                  }
                }
              }
            }
          }
        });
      }
    }

    function renderTable() {
      if (isAdminHidden('detailTableBlock')) return;
      const body = document.getElementById('detailBody');
      const rows = (perfData.records || []).map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.person}</td>
          <td>${r.client || '-'}</td>
          <td>${r.task_desc}</td>
          <td>${r.quantity}${r.unit || ''}</td>
        </tr>
      `).join('');
      body.innerHTML = rows || `<tr><td colspan="8" class="muted">暂无数据</td></tr>`;
    }

    function resetFilter() {
      document.getElementById('fPerson').value = '';
      document.getElementById('fFrom').value = '';
      document.getElementById('fTo').value = '';
      try { sessionStorage.removeItem(STORAGE_KEY); } catch(e) {}
      loadPerf();
    }

    async function exportPerf() {
      const body = {
        person: document.getElementById('fPerson').value,
        from: document.getElementById('fFrom').value,
        to: document.getElementById('fTo').value
      };
      const res = await fetch('/api/performance/export', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) return;
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'performance_export.xlsx';
      a.click();
    }

    // ── 筛选状态持久化（sessionStorage） ──────────────────────
    const STORAGE_KEY = 'pp_filter_state';

    function saveFilterState() {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          person: document.getElementById('fPerson').value,
          from:   document.getElementById('fFrom').value,
          to:     document.getElementById('fTo').value,
          activeFilter: activeCustomFilter,
          selectedClients: selectedClients,
          selectedPersons: selectedPersons
        }));
      } catch(e) {}
    }

    function restoreFilterState() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch(e) { return null; }
    }
    // ── end 筛选状态持久化 ──────────────────────────────────────

    // 模块顺序排列
    const MODULE_BLOCKS = [
      { key: 'stats_panel',    id: 'statsWrap' },
      { key: 'insight',        id: 'insightCard' },
      { key: 'kpi_trend',      id: 'kpiTrendCard' },
      { key: 'daily_charts',   id: 'dailyChartsBlock' },
      { key: 'filter_stats',   id: 'customFilterCard' },
      { key: 'client_kpi',     id: 'clientKpiCard' },
      { key: 'person_compare', id: 'personCompareCard' },
      { key: 'detail_table',   id: 'detailTableBlock' }
    ];

    function applyModuleOrder(order, hiddenModules) {
      const wrap = document.getElementById('mainWrap');
      if (!wrap) return;
      const hidden = new Set(hiddenModules || []);
      const seen = new Set();
      const orderedIds = [];
      (order || []).forEach(key => {
        const block = MODULE_BLOCKS.find(m => m.key === key);
        if (block && !seen.has(block.id)) { seen.add(block.id); orderedIds.push({ id: block.id, key }); }
      });
      MODULE_BLOCKS.forEach(m => { if (!seen.has(m.id)) orderedIds.push({ id: m.id, key: m.key }); });
      orderedIds.forEach(({ id, key }) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.dataset.adminHidden = hidden.has(key) ? '1' : '0';
        // 被后台隐藏的模块直接 display:none，不等渲染函数判断
        if (hidden.has(key)) el.style.display = 'none';
        wrap.appendChild(el);
      });
      // footer 始终置于最末尾
      const footer = document.getElementById('pageFooter');
      if (footer) wrap.appendChild(footer);
    }

    async function init() {
      // 恢复已保存的状态
      const saved = restoreFilterState();
      if (saved) {
        if (saved.activeFilter)    activeCustomFilter = saved.activeFilter;
        if (saved.selectedPersons) selectedPersons    = saved.selectedPersons;
        if (saved.selectedClients !== undefined) selectedClients = saved.selectedClients;
      }

      // 先单独拉配置（加时间戳防缓存），用于初始化主题/标题/顺序/人员下拉
      const cfgRes = await fetch(`/api/performance/summary?_=${Date.now()}`);
      const cfgData = await cfgRes.json();
      const cfg    = cfgData.config || {};
      const appCfg = cfg.app || {};

      // 应用主题（localStorage优先，其次后台默认，最后dark）
      initTheme(appCfg.default_theme);

      // 应用小数位
      _decimalPlaces = typeof appCfg.decimal_places === 'number'
        ? appCfg.decimal_places
        : parseInt(appCfg.decimal_places || '0') || 0;

      // 统计指标顺序
      if (appCfg.stats_order && appCfg.stats_order.length) {
        _statsOrder = appCfg.stats_order;
      }

      // 应用标题
      _chartTitles = appCfg.titles || {};
      applyTitles(_chartTitles);
      renderFooter(appCfg.footer_items || []);
      const setEl = (id, v) => { const el = document.getElementById(id); if (el && v) el.textContent = v; };
      setEl('ctMonthChart',       _chartTitles.mod_monthly_charts);
      setEl('ctPersonChart',      _chartTitles.mod_person_charts);
      setEl('ctPersonKpiPieChart', _chartTitles.mod_person_kpi_pie);

      // 渲染主题切换器
      renderThemeSwitcher();

      // 初始化人员下拉
      const people = appCfg.people_enabled?.length ? appCfg.people_enabled
        : (cfg.people_enabled?.length ? cfg.people_enabled : (cfg.people || []));
      setSelectOptions(document.getElementById('fPerson'), people, '全部人员');

      // 恢复筛选条件到控件
      if (saved) {
        if (saved.person && people.includes(saved.person))
          document.getElementById('fPerson').value = saved.person;
        if (saved.from) document.getElementById('fFrom').value = saved.from;
        if (saved.to)   document.getElementById('fTo').value   = saved.to;
      }

      applyModuleOrder(appCfg.module_order || [], appCfg.hidden_modules || []);

      // 无论是否有筛选条件，统一走 loadPerf() 拉最新数据渲染
      // 保证每次打开页面都从服务器取最新数据，不受浏览器缓存影响
      await loadPerf();
    }

    function startWhenChartReady() {
      if (window.Chart) {
        init();
        return;
      }
      setTimeout(startWhenChartReady, 120);
    }

    startWhenChartReady();
  </script>
</body>
</html>
